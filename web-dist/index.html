          <div class="card">
            <p class="label">Last 7 Days</p>
            <ul id="weekHistoryList" class="set-list"></ul>
          </div>
        </section>

        <section id="workoutView" class="view hidden">
          <div class="card">
            <p class="label">Assistant</p>
            <p id="assistantReply">Jarvis is standing by.</p>
          </div>

          <textarea id="transcriptInput" placeholder="Your move..."></textarea>
          <button id="processTypedBtn" class="secondary">Send</button>

          <p id="statusText" class="status">Session: Inactive</p>
          <p id="ttsSourceText" class="status subtle">TTS: Browser</p>

          <div class="card">
            <p class="label">Current Session</p>
            <ul id="sessionExerciseList" class="set-list"></ul>
          </div>

          <div class="card">
            <p class="label">Recent Sets</p>
            <ul id="setList" class="set-list"></ul>
          </div>
